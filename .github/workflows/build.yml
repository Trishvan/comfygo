name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev cmake build-essential

      - name: Cache stable-diffusion.cpp build
        if: runner.os == 'Linux'
        id: cache-sd
        uses: actions/cache@v4
        with:
          path: Sdcpp
          key: sd-cpp-${{ runner.os }}-c2df4e1

      - name: Build stable-diffusion.cpp (Linux)
        if: runner.os == 'Linux' && steps.cache-sd.outputs.cache-hit != 'true'
        run: |
          curl -sL "https://github.com/leejet/stable-diffusion.cpp/archive/c2df4e1.tar.gz" | tar xz -C /tmp
          mv /tmp/stable-diffusion.cpp-c2df4e1 /tmp/stable-diffusion.cpp
          cd /tmp/stable-diffusion.cpp
          git init && git add . && git commit -m "snapshot" --quiet
          git submodule update --init --recursive --depth 1
          mkdir -p build && cd build
          cmake .. -DSD_WEBP=OFF -DSD_WEBM=OFF -DCMAKE_BUILD_TYPE=Release
          cmake --build . --config Release -j$(nproc)
          SDCPP_DIR="$GITHUB_WORKSPACE/Sdcpp/sd-master-c2df4e1-bin-Linux-Ubuntu-24.04-x86_64-vulkan"
          mkdir -p "$SDCPP_DIR"
          cp libstable-diffusion.so "$SDCPP_DIR/"

      - name: Install Wails CLI (Linux only)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
          wails version

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Build frontend (all platforms)
        run: npm run build
        working-directory: frontend

      - name: Generate Wails bindings (Linux only)
        if: runner.os == 'Linux'
        run: wails generate module

      - name: Build Wails app
        if: runner.os == 'Linux'
        run: wails build -tags webkit2_41 -o comfygo-${{ runner.os }}
        env:
          CGO_LDFLAGS: ""

      - name: Go vet (macOS/Windows)
        if: runner.os != 'Linux'
        run: go vet ./...

      - name: Upload artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: comfygo-${{ runner.os }}
          path: build/bin/comfygo-*
