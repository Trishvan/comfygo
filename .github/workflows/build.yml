name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev unzip

      - name: Download stable-diffusion.cpp prebuilt binary (Linux)
        if: runner.os == 'Linux'
        run: |
          SDCPP_DIR="$GITHUB_WORKSPACE/Sdcpp/sd-master-c2df4e1-bin-Linux-Ubuntu-24.04-x86_64-vulkan"
          mkdir -p "$SDCPP_DIR"
          curl -sL "https://github.com/leejet/stable-diffusion.cpp/releases/download/master-700-c2df4e1/sd-master-c2df4e1-bin-Linux-Ubuntu-24.04-x86_64-vulkan.zip" -o /tmp/sdcpp.zip
          unzip -o /tmp/sdcpp.zip -d "$SDCPP_DIR"
          ls -la "$SDCPP_DIR"

      - name: Install Wails CLI (Linux only)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
          wails version

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Build frontend (all platforms)
        run: npm run build
        working-directory: frontend

      - name: Generate Wails bindings (Linux only)
        if: runner.os == 'Linux'
        run: wails generate module

      - name: Build Wails app
        if: runner.os == 'Linux'
        run: wails build -tags webkit2_41 -o comfygo-${{ runner.os }}
        env:
          CGO_LDFLAGS: ""

      - name: Download stable-diffusion.cpp prebuilt (macOS)
        if: runner.os == 'macOS'
        run: |
          SDCPP_DIR="$GITHUB_WORKSPACE/Sdcpp/sd-master-c2df4e1-bin-Darwin-macOS-15.7.7-arm64"
          mkdir -p "$SDCPP_DIR"
          curl -sL "https://github.com/leejet/stable-diffusion.cpp/releases/download/master-700-c2df4e1/sd-master-c2df4e1-bin-Darwin-macOS-15.7.7-arm64.zip" -o /tmp/sdcpp.zip
          unzip -o /tmp/sdcpp.zip -d "$SDCPP_DIR"
          # Adjust cgo path — macOS uses .dylib not .so
          if [ -f "$SDCPP_DIR/libstable-diffusion.dylib" ]; then
            ln -sf libstable-diffusion.dylib "$SDCPP_DIR/libstable-diffusion.so"
          fi

      - name: Download stable-diffusion.cpp prebuilt (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          SDCPP_DIR="$GITHUB_WORKSPACE/Sdcpp/sd-master-c2df4e1-bin-win-vulkan-x64"
          mkdir -p "$SDCPP_DIR"
          curl -sL "https://github.com/leejet/stable-diffusion.cpp/releases/download/master-700-c2df4e1/sd-master-c2df4e1-bin-win-vulkan-x64.zip" -o /tmp/sdcpp.zip
          unzip -o /tmp/sdcpp.zip -d "$SDCPP_DIR"

      - name: Go vet (macOS/Windows)
        if: runner.os != 'Linux'
        run: go vet ./...

      - name: Upload artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: comfygo-${{ runner.os }}
          path: build/bin/comfygo-*
