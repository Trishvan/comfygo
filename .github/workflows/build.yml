name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI (Linux only)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
          wails version

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Generate Wails bindings (Linux only)
        if: runner.os == 'Linux'
        run: wails generate module

      - name: Build Wails app
        if: runner.os == 'Linux'
        run: wails build -tags webkit2_41 -o comfygo-${{ runner.os }}
        env:
          CGO_LDFLAGS: ""

      - name: Cross-platform Go vet
        if: runner.os != 'Linux'
        run: go vet ./...

      - name: Frontend type-check (macOS/Windows)
        if: runner.os != 'Linux'
        run: npm run check
        working-directory: frontend
        continue-on-error: true

      - name: Upload artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: comfygo-${{ runner.os }}
          path: build/bin/comfygo-*
